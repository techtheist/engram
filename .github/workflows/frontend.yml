name: Frontend

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend.yml']
  pull_request:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend.yml']
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Lint, type-check, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint

      - name: Stylelint
        run: bun run lint:style

      - name: Type-check & build
        run: bun run build
