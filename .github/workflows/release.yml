name: Release

# Step 2 of the release flow: fires when the draft created by draft-release.yml
# is published (approved in the GitHub UI). Builds every distributable and
# attaches it to the release; JetBrains also publishes to Marketplace.
# Artifact versions derive from the tag (v0.1.2 -> 0.1.2), not from the files
# checked into the repo.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)build artifacts for, e.g. v0.1.2'
        required: true

permissions:
  contents: write

env:
  # Release event -> the tag ref; manual dispatch -> the tag input.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  binaries:
    name: Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # No x86_64-apple-darwin: ort-sys ships no prebuilt ONNX Runtime for
      # Intel macs anymore; source builds are documented in the README.
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: oven-sh/setup-bun@v2

      # engram-http embeds frontend/dist at compile time (rust-embed).
      - name: Build pane
        shell: bash
        run: bun install --frozen-lockfile && bun run build-only
        working-directory: frontend

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Every crate inherits the workspace version, so stamping the root
      # manifest fixes `engram-alpha --version`, /health, MCP server info AND the
      # version recorded on audit journal rows in one place.
      - name: Sync workspace version from tag
        shell: bash
        run: |
          V="${RELEASE_TAG#v}"
          sed -i.bak "s/^version = \"[0-9.]*\"/version = \"$V\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - name: Build release binary
        run: cargo build --release -p engram

      - name: Package tarball + checksum
        if: runner.os != 'Windows'
        run: |
          ASSET="engram-alpha-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          tar -czf "$ASSET" -C target/release engram-alpha
          shasum -a 256 "$ASSET" > "$ASSET.sha256"
          ASSETS="$ASSET $ASSET.sha256"
          # Transition shim, v0.4.x ONLY (self-sunsetting — the gate below
          # stops shipping these at v0.5): pre-rename binaries self-update
          # from assets named engram-<tag>-<target> containing a file named
          # `engram`, so ship the new binary under the old name once and
          # their `engram update` lands them on the current version in place.
          if [[ "$RELEASE_TAG" == v0.4.* ]]; then
            LEGACY="engram-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
            cp target/release/engram-alpha engram
            tar -czf "$LEGACY" engram
            shasum -a 256 "$LEGACY" > "$LEGACY.sha256"
            ASSETS="$ASSETS $LEGACY $LEGACY.sha256"
          fi
          echo "ASSETS=$ASSETS" >> "$GITHUB_ENV"

      # Two Windows assets: the zip for humans, and the raw .exe so install.sh
      # needs no unzip inside WSL (fresh Ubuntu ships without it).
      - name: Package zip + raw exe + checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = "engram-alpha-$env:RELEASE_TAG-${{ matrix.target }}.zip"
          $exe = "engram-alpha-$env:RELEASE_TAG-${{ matrix.target }}.exe"
          Compress-Archive -Path target/release/engram-alpha.exe -DestinationPath $zip
          Copy-Item target/release/engram-alpha.exe $exe
          $files = @($zip, $exe)
          # Transition shim, v0.4.x ONLY (self-sunsetting): pre-rename
          # engram.exe self-updates from the raw exe asset under the old name.
          if ($env:RELEASE_TAG -like "v0.4.*") {
            $legacy = "engram-$env:RELEASE_TAG-${{ matrix.target }}.exe"
            Copy-Item target/release/engram-alpha.exe $legacy
            $files += $legacy
          }
          foreach ($f in $files) {
            $hash = (Get-FileHash $f -Algorithm SHA256).Hash.ToLower()
            "$hash  $f" | Out-File -Encoding ascii "$f.sha256"
          }
          $list = ($files | ForEach-Object { "$_ ${_}.sha256" }) -join " "
          "ASSETS=$list" | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - name: Attach to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Deliberately unquoted: ASSETS is a space-separated file list.
        run: gh release upload "$RELEASE_TAG" $ASSETS --clobber

  jetbrains:
    name: JetBrains — sign, attach, publish
    runs-on: ubuntu-latest
    # PUBLISH_TOKEN lives in the "engram" environment; without this line the
    # job cannot see environment-scoped secrets.
    environment: engram
    defaults:
      run:
        working-directory: engram-jetbrains
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Produces build/distributions/*-signed.zip. The version (and thus the
      # Marketplace channel) comes from the tag, overriding gradle.properties.
      - name: Build & sign plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew signPlugin -PpluginVersion="${RELEASE_TAG#v}"

      # signPlugin silently skips when the signing secrets are absent — fail
      # here with a clear message instead of a confusing empty-glob upload.
      - name: Assert signed zip exists
        run: |
          ls build/distributions/*-signed.zip || {
            echo "::error::No signed zip. Are CERTIFICATE_CHAIN / PRIVATE_KEY / PRIVATE_KEY_PASSWORD secrets set?"
            exit 1
          }

      - name: Attach signed zip to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" build/distributions/*-signed.zip --clobber

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        # A re-dispatch for an already-published tag must not read as failure.
        run: |
          set +e
          OUT=$(./gradlew publishPlugin -PpluginVersion="${RELEASE_TAG#v}" 2>&1)
          CODE=$?
          echo "$OUT"
          if [ $CODE -ne 0 ] && echo "$OUT" | grep -q "already contains version"; then
            echo "Version already on Marketplace — treating as success."
            exit 0
          fi
          exit $CODE

  vscode:
    name: VSCode — package, attach
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The extension bundles the repo's frontend build.
      - name: Build pane
        run: bun install --frozen-lockfile && bun run build-only
        working-directory: frontend

      - name: Sync extension version from tag
        run: npm version --no-git-tag-version --allow-same-version "${RELEASE_TAG#v}"
        working-directory: engram-vscode

      - name: Package VSIX
        run: |
          npm ci && npm run build && npm run package
          echo "VSIX=$(ls "$PWD"/*.vsix)" >> "$GITHUB_ENV"
        working-directory: engram-vscode

      - name: Attach VSIX to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" "$VSIX" --clobber

      # Both marketplaces get the exact same file that was attached above.
      - name: Publish to Open VSX
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ env.VSIX }}
          skipDuplicate: true

      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ env.VSIX }}
          skipDuplicate: true
