name: Release

# Step 2 of the release flow: fires when the draft created by draft-release.yml
# is published (approved in the GitHub UI). Builds every distributable and
# attaches it to the release; JetBrains also publishes to Marketplace.
# Artifact versions derive from the tag (v0.1.2 -> 0.1.2), not from the files
# checked into the repo.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)build artifacts for, e.g. v0.1.2'
        required: true

permissions:
  contents: write

env:
  # Release event -> the tag ref; manual dispatch -> the tag input.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  binaries:
    name: Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: oven-sh/setup-bun@v2

      # engram-http embeds frontend/dist at compile time (rust-embed).
      - name: Build pane
        shell: bash
        run: bun install --frozen-lockfile && bun run build-only
        working-directory: frontend

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p engram

      - name: Package tarball + checksum
        if: runner.os != 'Windows'
        run: |
          ASSET="engram-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          tar -czf "$ASSET" -C target/release engram
          shasum -a 256 "$ASSET" > "$ASSET.sha256"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Package zip + checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "engram-$env:RELEASE_TAG-${{ matrix.target }}.zip"
          Compress-Archive -Path target/release/engram.exe -DestinationPath $asset
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          "$hash  $asset" | Out-File -Encoding ascii "$asset.sha256"
          "ASSET=$asset" | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - name: Attach to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" "$ASSET" "$ASSET.sha256" --clobber

  jetbrains:
    name: JetBrains — sign, attach, publish
    runs-on: ubuntu-latest
    # PUBLISH_TOKEN lives in the "engram" environment; without this line the
    # job cannot see environment-scoped secrets.
    environment: engram
    defaults:
      run:
        working-directory: engram-jetbrains
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Produces build/distributions/*-signed.zip. The version (and thus the
      # Marketplace channel) comes from the tag, overriding gradle.properties.
      - name: Build & sign plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew signPlugin -PpluginVersion="${RELEASE_TAG#v}"

      # signPlugin silently skips when the signing secrets are absent — fail
      # here with a clear message instead of a confusing empty-glob upload.
      - name: Assert signed zip exists
        run: |
          ls build/distributions/*-signed.zip || {
            echo "::error::No signed zip. Are CERTIFICATE_CHAIN / PRIVATE_KEY / PRIVATE_KEY_PASSWORD secrets set?"
            exit 1
          }

      - name: Attach signed zip to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" build/distributions/*-signed.zip --clobber

      - name: Publish to JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin -PpluginVersion="${RELEASE_TAG#v}"

  vscode:
    name: VSCode — package, attach
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The extension bundles the repo's frontend build.
      - name: Build pane
        run: bun install --frozen-lockfile && bun run build-only
        working-directory: frontend

      - name: Sync extension version from tag
        run: npm version --no-git-tag-version --allow-same-version "${RELEASE_TAG#v}"
        working-directory: engram-vscode

      - name: Package VSIX
        run: npm ci && npm run build && npm run package
        working-directory: engram-vscode

      - name: Attach VSIX to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" engram-vscode/*.vsix --clobber

      # Marketplace publishing is deliberately deferred. When ready, add
      # HaaLeo/publish-vscode-extension here with VSCE_PAT (VS Marketplace)
      # and OVSX_PAT (Open VSX) secrets — the same .vsix goes to both.
